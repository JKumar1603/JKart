spring.application.name=C02ApiGateway
 
server.port=9090
 
# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
 
# Gateway Routes
 
# Auth Service
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://C03AUTHSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**
 
# Product Service
spring.cloud.gateway.server.webflux.routes[1].id=product-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://C04PRODUCTSERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/products/**
 
# Order Service
spring.cloud.gateway.server.webflux.routes[2].id=order-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://C05ORDERSERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/orders/**
 
# Notification Service
spring.cloud.gateway.server.webflux.routes[3].id=notification-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://C06NOTIFICATIONSERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/notifications/**
 
# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true